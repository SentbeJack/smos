<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SMOS · 온보딩 현황</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
  :root{
    --bg:#F2F6FF; --surface:#FFFFFF; --surface-2:#F7F9FE;
    --border:#D6E2F8; --border-strong:#B4CCF8;
    --ink:#1A1D29; --ink-2:#3D5080; --muted:#8A95B5;
    --accent:#3176FD; --accent-2:#0746CA; --accent-tint:#F2F6FF;
    --radius:14px; --radius-sm:10px;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --shadow:0 1px 2px rgba(18,38,102,.04), 0 4px 16px rgba(18,38,102,.06);
    --shadow-lg:0 12px 40px rgba(26,29,41,.18);
    --s-recv-t:#0C3698; --s-recv-b:#F2F6FF; --s-recv-d:#6196FD;
    --s-rev-t:#8A5A08;  --s-rev-b:#FFF8E1;  --s-rev-d:#D99A0B;
    --s-vaw-t:#B0450D;  --s-vaw-b:#FCEBDF;  --s-vaw-d:#EA6A1C;
    --s-vac-t:#0746CA;  --s-vac-b:#C8DBFC;  --s-vac-d:#3176FD;
    --s-live-t:#063D2B; --s-live-b:#C9F7E1; --s-live-d:#00C592;
    --s-rej-t:#B42318;  --s-rej-b:#FCEBEA;  --s-rej-d:#E5533F;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.45;
    overflow-x:hidden; -webkit-tap-highlight-color:transparent;}
  .wrap{max-width:620px; margin:0 auto; min-height:100%; display:flex; flex-direction:column;}

  header{position:sticky; top:0; z-index:20;
    background:rgba(242,246,255,.88); backdrop-filter:saturate(180%) blur(12px); -webkit-backdrop-filter:saturate(180%) blur(12px);
    border-bottom:1px solid var(--border); padding:calc(env(safe-area-inset-top) + 13px) 16px 0;}
  .brand{display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .brand-l{display:flex; flex-direction:column; gap:1px; min-width:0;}
  .brand-title{font-size:19px; font-weight:750; letter-spacing:-.02em; display:flex; align-items:center; gap:8px;}
  .brand-mark{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.08em; color:var(--accent); background:var(--accent-tint); padding:3px 7px; border-radius:6px;}
  .brand-sub{font-size:11.5px; color:var(--muted); font-family:var(--mono);}
  .sync{display:inline-flex; align-items:center; gap:6px; cursor:pointer;}
  .sync .sdot{width:7px; height:7px; border-radius:50%; background:var(--muted); flex:none;}
  .sync.live{color:var(--s-live-t);}
  .sync.live .sdot{background:var(--s-live-d); animation:pulse 2s infinite;}
  .sync.off{color:var(--s-rej-t);}
  .sync.off .sdot{background:var(--s-rej-d);}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,197,146,.5)}70%{box-shadow:0 0 0 6px rgba(0,197,146,0)}100%{box-shadow:0 0 0 0 rgba(0,197,146,0)}}
  .lang-toggle{display:inline-flex; background:var(--surface); border:1px solid var(--border-strong); border-radius:9px; padding:3px; gap:2px; flex:none;}
  .lang-toggle button{border:0; background:transparent; font:inherit; font-size:12.5px; font-weight:600; color:var(--ink-2); padding:5px 11px; border-radius:6px; cursor:pointer; transition:all .15s;}
  .lang-toggle button.on{background:var(--ink); color:#fff;}

  .tabs{display:flex; gap:4px; margin-top:13px; background:var(--surface); border:1px solid var(--border-strong); border-radius:11px; padding:3px;}
  .tabs button{flex:1; border:0; background:transparent; font:inherit; font-size:13.5px; font-weight:650; color:var(--ink-2); padding:9px; border-radius:8px; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:7px;}
  .tabs button .tcnt{font-family:var(--mono); font-size:11px; font-weight:700; opacity:.6;}
  .tabs button.on{background:var(--ink); color:#fff;}

  .search{margin-top:11px; position:relative;}
  .search svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted);}
  .search input{width:100%; height:44px; border:1px solid var(--border-strong); background:var(--surface); border-radius:11px; padding:0 14px 0 38px; font:inherit; font-size:16px; color:var(--ink); outline:none; transition:border-color .15s, box-shadow .15s;}
  .search input::placeholder{color:var(--muted);}
  .search input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-tint);}

  .chips{display:flex; gap:7px; overflow-x:auto; padding:11px 0 12px; scrollbar-width:none; -webkit-overflow-scrolling:touch;}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none; display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border-strong); background:var(--surface); color:var(--ink-2); font:inherit; font-size:12.5px; font-weight:600; padding:6px 11px; border-radius:999px; cursor:pointer; transition:all .15s; white-space:nowrap;}
  .chip .cnt{font-family:var(--mono); font-size:11px; font-weight:700; color:var(--muted);}
  .chip .dot{width:7px; height:7px; border-radius:50%;}
  .chip.on{background:var(--ink); border-color:var(--ink); color:#fff;}
  .chip.on .cnt{color:rgba(255,255,255,.7)}

  .toolbar{display:flex; flex-wrap:wrap; gap:7px; padding:0 0 12px;}
  .toolbar button{border:1px solid var(--border-strong); background:var(--surface); color:var(--ink-2); font:inherit; font-size:12px; font-weight:600; padding:6px 11px; border-radius:8px; cursor:pointer; display:inline-flex; align-items:center; gap:5px; transition:all .15s;}
  .toolbar button:hover{background:var(--surface-2); border-color:var(--accent); color:var(--accent);}
  .toolbar button.sort-on{background:var(--accent-tint); border-color:var(--accent); color:var(--accent);}

  main{flex:1; padding:14px 16px calc(env(safe-area-inset-bottom) + 24px);}
  .group{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:11px; box-shadow:var(--shadow); overflow:hidden;}
  .group-head{display:flex; align-items:center; gap:11px; padding:13px 15px; cursor:pointer; user-select:none; transition:background .12s;}
  .group-head:hover{background:var(--surface-2);}
  .group-head:active{background:#F1F3F6;}
  .chev{flex:none; color:var(--muted); transition:transform .22s cubic-bezier(.3,.7,.3,1);}
  .group.open .chev{transform:rotate(90deg);}
  .group-name{font-size:15px; font-weight:700; letter-spacing:-.01em; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .group-meta{display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex:none;}
  .ratio{display:flex; align-items:center; gap:7px;}
  .ratio-bar{width:52px; height:5px; border-radius:3px; background:var(--s-rej-b); overflow:hidden;}
  .ratio-bar i{display:block; height:100%; background:var(--s-live-d); border-radius:3px;}
  .ratio-txt{font-family:var(--mono); font-size:11px; font-weight:600; color:var(--muted);}
  .attn-cnt{font-family:var(--mono); font-size:10px; font-weight:700; color:var(--s-vaw-t); background:var(--s-vaw-b); padding:1px 6px; border-radius:4px;}

  .rows{max-height:0; overflow:hidden; transition:max-height .3s cubic-bezier(.3,.7,.3,1);}
  .group.open .rows{max-height:20000px;}
  .rows-inner{padding:0 8px 8px;}

  .item{border-top:1px solid var(--border);}
  .item-row{display:flex; align-items:center; gap:11px; padding:11px 8px; cursor:pointer; border-radius:10px; transition:background .12s;}
  .item-row:hover{background:var(--surface-2);}
  .item-row:active{background:#F1F3F6;}
  .item.attn-high .item-row{border-left:3px solid var(--s-rej-d); margin-left:-3px;}
  .item-main{flex:1; min-width:0; display:flex; flex-direction:column; gap:6px;}
  .item-name{font-size:14.5px; font-weight:600; letter-spacing:-.01em; line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .item-sub{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .mid{font-family:var(--mono); font-size:10.5px; font-weight:600; color:var(--muted);}
  .reason-chip{font-size:10.5px; font-weight:650; color:var(--s-rej-t); background:var(--s-rej-b); padding:2px 7px; border-radius:5px;}
  .va-flag{font-family:var(--mono); font-size:10px; font-weight:700; padding:2px 6px; border-radius:5px;}
  .va-yes{color:var(--s-vac-t); background:var(--s-vac-b); cursor:pointer; transition:all .12s;}
  .va-yes:active{transform:scale(.95);}
  .va-copy{display:inline-flex; align-items:center; gap:6px; cursor:pointer; padding:5px 10px; background:var(--accent-tint); border:1px solid var(--border); border-radius:8px; transition:all .12s; font-family:var(--mono); font-size:12px; color:var(--ink);}
  .va-copy:active{transform:scale(.97); border-color:var(--accent);}
  .va-copy .copy-ic{color:var(--accent); flex:none; opacity:.5;}
  .url-chip{font-size:10px; font-weight:650; color:var(--accent); background:var(--accent-tint); padding:2px 7px; border-radius:5px; text-decoration:none; white-space:nowrap; display:inline-flex; align-items:center; gap:2px;}
  .url-chip:active{background:#E1E5FB;}
  .step-tag{font-family:var(--mono); font-size:9.5px; font-weight:700; padding:1px 6px; border-radius:4px; white-space:nowrap; color:var(--accent); background:var(--accent-tint);}
  .step-tag.step-fail{color:var(--s-rej-t); background:var(--s-rej-b);}
  .step-tag.step-done{color:var(--s-live-t); background:var(--s-live-b);}
  .tracker{display:flex; align-items:flex-start; padding:6px 0 10px;}
  .trk-step{display:flex; flex-direction:column; align-items:center; gap:4px; flex:none; min-width:38px;}
  .trk-dot{width:10px; height:10px; border-radius:50%; border:2px solid var(--border-strong); background:var(--surface);}
  .trk-step.done .trk-dot{background:var(--s-live-d); border-color:var(--s-live-d);}
  .trk-step.active .trk-dot{background:var(--accent); border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-tint);}
  .trk-step.fail .trk-dot{background:var(--s-rej-d); border-color:var(--s-rej-d); box-shadow:0 0 0 3px var(--s-rej-b);}
  .trk-lbl{font-size:9px; font-weight:600; color:var(--muted); text-align:center; white-space:nowrap;}
  .trk-step.done .trk-lbl{color:var(--s-live-t);}
  .trk-step.active .trk-lbl{color:var(--accent); font-weight:700;}
  .trk-step.fail .trk-lbl{color:var(--s-rej-t); font-weight:700;}
  .trk-line{flex:1; height:2px; background:var(--border); min-width:8px; margin-top:4px;}
  .trk-line.done{background:var(--s-live-d);}
  .badge{flex:none; display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:650; padding:4px 9px; border-radius:999px; letter-spacing:-.01em; white-space:nowrap;}
  .badge .bd{width:6px; height:6px; border-radius:50%;}

  .detail{max-height:0; overflow:hidden; transition:max-height .3s cubic-bezier(.3,.7,.3,1);}
  .item.open .detail{max-height:1400px;}
  .detail-inner{padding:2px 10px 15px; display:flex; flex-direction:column; gap:9px;}
  .d-item{display:flex; align-items:baseline; gap:10px;}
  .d-key{font-size:11.5px; color:var(--muted); font-weight:600; width:64px; flex:none;}
  .d-val{font-size:13px; color:var(--ink); flex:1; min-width:0; word-break:break-word;}
  .d-val.mono{font-family:var(--mono); font-size:11.5px;}
  .link-btn{display:inline-flex; align-items:center; gap:6px; font:inherit; font-size:12.5px; font-weight:600; color:var(--accent); text-decoration:none; background:var(--accent-tint); padding:6px 11px; border-radius:8px; transition:background .15s;}
  .link-btn:hover{background:#E1E5FB;}
  .reason-val{color:var(--s-rej-t); background:var(--s-rej-b); padding:3px 9px; border-radius:7px; font-size:12px; font-weight:600; display:inline-block;}
  .memo-val{font-size:12.5px; color:var(--ink-2); background:var(--surface-2); border:1px solid var(--border); border-radius:9px; padding:9px 11px; white-space:pre-wrap; display:block;}
  .share-btn{display:inline-flex; align-items:center; gap:5px; cursor:pointer; padding:7px 12px; background:var(--surface-2); border:1px solid var(--border); border-radius:8px; font:inherit; font-size:12px; font-weight:600; color:var(--ink-2); transition:all .12s; width:100%;}
  .share-btn:active{transform:scale(.98); border-color:var(--accent); color:var(--accent);}

  .backdrop{position:fixed; inset:0; z-index:50; background:rgba(20,23,28,.42); display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s;}
  .backdrop.show{opacity:1; pointer-events:auto;}
  .modal{background:var(--surface); width:100%; max-width:620px; border-radius:20px 20px 0 0; max-height:92vh; overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; transform:translateY(24px); transition:transform .24s cubic-bezier(.3,.8,.3,1); padding:8px 18px calc(env(safe-area-inset-bottom) + 20px);}
  .backdrop.show .modal{transform:translateY(0);}
  .grabber{width:38px; height:4px; background:var(--border-strong); border-radius:3px; margin:8px auto 6px;}
  .modal h2{font-size:17px; font-weight:700; letter-spacing:-.01em; padding:6px 2px 4px;}
  .modal .msub{font-size:12px; color:var(--muted); padding:0 2px 16px; font-family:var(--mono);}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--ink-2); margin-bottom:6px;}
  .field input, .field textarea, .field select{width:100%; border:1px solid var(--border-strong); background:var(--surface); border-radius:10px; padding:11px 12px; font:inherit; font-size:16px; color:var(--ink); outline:none; transition:border-color .15s, box-shadow .15s;}
  .field textarea{resize:vertical; min-height:60px; line-height:1.5;}
  .field input:focus, .field textarea:focus, .field select:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-tint);}
  .modal-actions{display:flex; gap:9px; padding-top:8px;}
  .modal-actions button{flex:1; border:0; font:inherit; font-size:14px; font-weight:650; padding:13px; border-radius:11px; cursor:pointer; transition:opacity .15s;}
  .modal-actions .save{background:var(--accent); color:#fff;}
  .modal-actions .cancel{background:var(--bg); color:var(--ink-2); border:1px solid var(--border-strong);}
  .modal-actions button:active{opacity:.85;}

  .toast{position:fixed; bottom:calc(env(safe-area-inset-bottom) + 24px); left:50%; transform:translateX(-50%) translateY(10px); background:var(--ink); color:#fff; font-size:13px; font-weight:500; padding:11px 18px; border-radius:11px; z-index:60; opacity:0; pointer-events:none; transition:all .25s; box-shadow:var(--shadow-lg); max-width:90%; text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  button,.chip,.item-row,.group-head,.tabs button,.lang-toggle button,.link-btn,.toolbar button,.share-btn{touch-action:manipulation;}
  @media (max-width:480px){
    header{padding-top:calc(env(safe-area-inset-top) + 11px);}
    .brand-title{font-size:18px;}
    .tabs{margin-top:11px;}
    .tabs button{padding:11px 8px; font-size:14px;}
    .search{margin-top:10px;}
    .chips{padding:10px 0 11px;}
    main{padding:12px 13px calc(env(safe-area-inset-bottom) + 24px);}
    .group-head{padding:14px 14px;}
    .item-row{padding:13px 8px;}
    .d-key{width:56px;}
    .toolbar{flex-wrap:wrap;}
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }

  .login-screen{position:fixed; inset:0; z-index:100; background:var(--bg); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; padding:24px;}
  .login-screen.hidden{display:none;}
  .login-card{background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px 32px 36px; text-align:center; max-width:360px; width:100%; box-shadow:var(--shadow-lg);}
  .login-card .brand-mark{font-family:var(--mono); font-size:13px; font-weight:700; letter-spacing:.08em; color:var(--accent); background:var(--accent-tint); padding:5px 10px; border-radius:8px; display:inline-block; margin-bottom:14px;}
  .login-card h1{font-size:20px; font-weight:750; letter-spacing:-.02em; margin-bottom:6px;}
  .login-card p{font-size:13px; color:var(--muted); margin-bottom:24px; line-height:1.5;}
  .login-card .login-error{font-size:12px; color:var(--s-rej-t); background:var(--s-rej-b); padding:8px 12px; border-radius:8px; margin-bottom:16px; display:none;}
  .login-card .login-error.show{display:block;}
  .g-btn{display:inline-flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border-strong); border-radius:12px; padding:12px 24px; font:inherit; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer; transition:all .15s; box-shadow:var(--shadow);}
  .g-btn:hover{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-tint);}
  .g-btn:active{transform:scale(.97);}
  .g-btn svg{flex:none;}
  .user-pill{display:inline-flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border-strong); border-radius:9px; padding:4px 10px 4px 4px; cursor:pointer; transition:all .15s;}
  .user-pill:hover{border-color:var(--accent);}
  .user-pill img{width:24px; height:24px; border-radius:50%;}
  .user-pill span{font-size:12px; font-weight:600; color:var(--ink-2); max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  .empty{text-align:center; padding:60px 20px; color:var(--muted);}
  .empty .big{font-size:16px; font-weight:700; color:var(--ink-2); margin-bottom:6px;}
  .empty .sm{font-size:13px;}

  .theme-toggle{width:32px; height:32px; border:1px solid var(--border-strong); background:var(--surface); border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--ink-2); transition:all .15s; flex:none; touch-action:manipulation;}
  .theme-toggle:hover{border-color:var(--accent); color:var(--accent);}

  .toolbar button.dash-on{background:var(--accent); border-color:var(--accent); color:#fff;}
  .dash{flex:1; padding:14px 16px calc(env(safe-area-inset-bottom) + 24px);}
  .dash-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 16px; margin-bottom:12px; box-shadow:var(--shadow);}
  .dash-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .dash-title{font-size:14px; font-weight:700; letter-spacing:-.01em;}
  .dash-sub{font-size:11px; color:var(--muted); font-family:var(--mono);}
  .dash-bar-row{display:flex; align-items:center; gap:10px; margin-bottom:7px;}
  .dash-bar-label{font-size:11.5px; font-weight:600; color:var(--ink-2); width:72px; flex:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .dash-bar-track{flex:1; height:20px; background:var(--surface-2); border-radius:6px; overflow:hidden;}
  .dash-bar-fill{height:100%; border-radius:6px; min-width:2px;}
  .dash-bar-val{font-family:var(--mono); font-size:11px; font-weight:700; color:var(--muted); flex:none; min-width:24px; text-align:right;}
  .dash-chart{width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch;}
  .dash-chart svg{display:block; width:100%; height:auto;}
  .dash-legend{display:flex; gap:14px; margin-top:10px; font-size:11px; color:var(--muted);}
  .dash-legend i{display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:4px; vertical-align:-1px;}

  [data-theme="dark"]{
    --bg:#0F1219; --surface:#1A1E2E; --surface-2:#222738;
    --border:#2E3450; --border-strong:#3D4568;
    --ink:#E2E6F3; --ink-2:#A0AACC; --muted:#6874A0;
    --accent:#6EA8FF; --accent-2:#4B88EF; --accent-tint:#172040;
    --shadow:0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.25);
    --shadow-lg:0 12px 40px rgba(0,0,0,.5);
    --s-recv-t:#8BB8FE; --s-recv-b:#172040; --s-recv-d:#6EA8FF;
    --s-rev-t:#F2CB5A;  --s-rev-b:#2C2510;  --s-rev-d:#D99A0B;
    --s-vaw-t:#F49662;  --s-vaw-b:#2C1C12;  --s-vaw-d:#EA6A1C;
    --s-vac-t:#6EA8FF;  --s-vac-b:#172040;  --s-vac-d:#3176FD;
    --s-live-t:#58E8A8;  --s-live-b:#122C22;  --s-live-d:#00C592;
    --s-rej-t:#F47868;  --s-rej-b:#2C1818;  --s-rej-d:#E5533F;
  }

/* SEED 데이터 없음 — 모든 데이터는 Apps Script 백엔드에서만 불러옵니다 */

/* ============================ Data layer ============================ */
const Store = {
  data:{KRW:[],VND:[]}, online:false, authError:false, lastSync:null,
  async fetchRemote(){ const url=BACKEND_URL+(Auth.token?"?token="+encodeURIComponent(Auth.token):""); const r=await fetch(url,{cache:"no-store"}); if(!r.ok) throw new Error("http "+r.status); return await r.json(); },
  async load(){
    if(BACKEND_URL && Auth.loggedIn){ try{ const d=await this.fetchRemote(); if(d.error){ console.warn("backend auth error:",d.message); this.online=false; this.authError=d.error==="forbidden"?"forbidden":"auth"; return; } if(d._user){ Auth.role=d._user.role; delete d._user; } this.data=d; this.online=true; this.authError=false; this.lastSync=Date.now(); ensureIds(this.data); return; }catch(e){ console.warn("backend load failed",e); this.online=false; } }
    this.data={KRW:[],VND:[]};
  },
  rows(){ return this.data[active] || (this.data[active]=[]); },
};
function ensureIds(d){ for(const k in d){ const v=d[k]; if(Array.isArray(v)) v.forEach(r=>{ if(!r.id) r.id=uid(); }); } }
async function refresh(){
  if(!BACKEND_URL || !Auth.loggedIn) return;
  if(backdrop.classList.contains("show")) return;
  try{ const d=await Store.fetchRemote(); if(d.error){ Store.online=false; Store.authError=d.error==="forbidden"?"forbidden":"auth"; updateSync(); return; } if(d._user){ Auth.role=d._user.role; delete d._user; } ensureIds(d); Store.data=d; Store.online=true; Store.authError=false; Store.lastSync=Date.now();
       const y=window.scrollY; render(); window.scrollTo(0,y); }
  catch(e){ Store.online=false; updateSync(); }
}
function rel(ts){ if(!ts) return L("syncWait"); const s=Math.floor((Date.now()-ts)/1000);
  if(s<10) return L("justNow"); if(s<60) return s+L("secAgo"); const m=Math.floor(s/60); if(m<60) return m+L("minAgo"); return Math.floor(m/60)+L("hrAgo"); }
function updateSync(){ const el=$("#syncPill"), w=$("#syncWrap"); if(!el||!w) return;
  if(!BACKEND_URL){ w.className="brand-sub sync off"; el.textContent=L("noBackend"); }
  else if(!Auth.loggedIn){ w.className="brand-sub sync off"; el.textContent=L("notLoggedIn"); }
  else if(Store.authError){ w.className="brand-sub sync off"; el.textContent=Store.authError==="forbidden"?L("forbidden"):L("authError"); }
  else if(Store.online){ w.className="brand-sub sync live"; el.textContent=L("live")+rel(Store.lastSync); }
  else { w.className="brand-sub sync off"; el.textContent=L("disconnected"); }
}

/* ============================ Helpers ============================ */
const $ = s=>document.querySelector(s);
const esc = s=>String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = ()=>Math.random().toString(36).slice(2,9);
const CORR = ()=>CORRIDORS[active];
const colOf = role=>CORR().columns.find(c=>c.role===role);
const groupField=()=>colOf("group").field;
const nameField =()=>colOf("name").field;
const colLabel = c => lang==="EN" ? (c.labelEn||c.label) : c.label;
function statusMeta(v){ const s=CORR().statuses.find(x=>x.v===v); const tone=TONES[s?s.tone:"slate"]; return {label:v||"—", ...tone}; }

function stepOf(r){
  const c=CORR(); if(!c.steps) return null;
  const n=c.steps.length;
  const states=new Array(n).fill("pending");
  states[0]="done";
  if(active==="KRW"){
    if(r.status==="KYC"||r.status==="Ops confirming"){ states[1]="active"; }
    else if(r.status==="Succeeded"){ states[1]="done"; states[2]="done"; if(r.va) states[3]="done"; }
    else if(r.status==="Failed"){ states[1]="done"; states[2]="fail"; }
  } else if(active==="VND"){
    if(r.status==="In progress"){ states[1]="active"; }
    else if(r.status==="Approved"){ states[1]="done"; states[2]="done"; if(r.va) states[3]="done"; }
    else if(r.status==="Rejected / Offboarded"){ states[1]="done"; states[2]="fail"; }
  }
  return {states, steps:c.steps};
}
function stepTag(r){
  const info=stepOf(r); if(!info) return "";
  const {states,steps}=info;
  const ai=states.indexOf("active"), fi=states.indexOf("fail");
  const sLbl=s=>lang==="EN"?(s.labelEn||s.label):s.label;
  if(fi>=0) return `<span class="step-tag step-fail">${sLbl(steps[fi])} ✕</span>`;
  if(ai>=0) return `<span class="step-tag">${ai+1}/${steps.length} ${sLbl(steps[ai])}</span>`;
  const done=states.filter(s=>s==="done").length;
  if(done===steps.length) return "";
  return `<span class="step-tag step-done">${done}/${steps.length}</span>`;
}
function stepTracker(r){
  const info=stepOf(r); if(!info) return "";
  const {states,steps}=info;
  const sLbl=s=>lang==="EN"?(s.labelEn||s.label):s.label;
  let h='<div class="tracker">';
  steps.forEach((s,i)=>{
    h+=`<div class="trk-step ${states[i]}"><div class="trk-dot"></div><div class="trk-lbl">${sLbl(s)}</div></div>`;
    if(i<steps.length-1){ const ld=states[i]==="done"&&states[i+1]!=="pending"; h+=`<div class="trk-line${ld?" done":""}"></div>`; }
  });
  return h+"</div>";
}
function isAttention(r){
  const fail=CORR().statuses.filter(s=>s.tone==="rose").map(s=>s.v);
  if(fail.includes(r.status)) return "high";
  return null;
}
function buildSummary(r){
  const name=r[nameField()]||"—";
  const mid=r.merchantId?` (${r.merchantId})`:"";
  const status=r.status||"—";
  const va=r.va?` · ${L("vaIssued")}`:"";
  const info=stepOf(r);
  let stepStr="";
  if(info){
    const ai=info.states.indexOf("active"), fi=info.states.indexOf("fail");
    const sLbl=s=>lang==="EN"?(s.labelEn||s.label):s.label;
    if(ai>=0) stepStr=` · ${ai+1}/${info.steps.length} ${sLbl(info.steps[ai])}`;
    else if(fi>=0) stepStr=` · ${sLbl(info.steps[fi])} ${lang==="EN"?"failed":"실패"}`;
  }
  const rc=CORR().columns.find(c=>c.type==="reason");
  const reason=rc&&r[rc.field]?` · ${r[rc.field]}`:"";
  return `${name}${mid} — ${status}${va}${reason}${stepStr}`;
}
function clipCopy(text,msg){ navigator.clipboard.writeText(text).then(()=>toast(msg)).catch(()=>{const t=document.createElement("textarea");t.value=text;t.style.position="fixed";t.style.opacity="0";document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);toast(msg);}); }

let active = "KRW";
let filter = "all";
let query = "";
let sortMode = "group";
let dashMode = false;
let darkTheme = false;
const openGroups = new Set();
const openItems = new Set();

/* ============================ Render ============================ */
function statusBadge(v){ const s=statusMeta(v); return `<span class="badge" style="color:var(${s.t});background:var(${s.b})"><span class="bd" style="background:var(${s.d})"></span>${esc(s.label)}</span>`; }

function matchRow(r){
  if(filter==="attention") return !!isAttention(r);
  if(filter!=="all" && r.status!==filter) return false;
  const q=query.toLowerCase(); if(!q) return true;
  return [nameField(),groupField(),"merchantId"].some(f=>String(r[f]||"").toLowerCase().includes(q));
}

function render(){
  $("#titleText").textContent = "Sub Merchant Onboarding Status";
  $("#search").placeholder = L("search");
  const sortBtn=$("#btnSort");
  sortBtn.textContent = sortMode==="recent"?L("sortRecent"):L("sortGroup");
  sortBtn.classList.toggle("sort-on", sortMode==="recent");
  $("#btnExportCsv").textContent = L("btnExportCsv");
  $("#btnExportJson").textContent = L("btnExportJson");
  const db=$("#btnDashboard"); db.textContent="📊 "+L("dashboard"); db.classList.toggle("dash-on",dashMode);
  renderTabs(); renderChips(); updateSync();
  if(dashMode){ renderDash(); return; }

  const rows = Store.rows().filter(matchRow);
  const gf=groupField(), nf=nameField();
  const groups={};
  rows.forEach(r=>{ const g=r[gf]||L("noGroup"); (groups[g]=groups[g]||[]).push(r); });
  let names=Object.keys(groups).sort((a,b)=>a.localeCompare(b));

  if(sortMode==="recent"){
    for(const g of names) groups[g].sort((a,b)=>(b.requestDate||"").localeCompare(a.requestDate||""));
    names.sort((a,b)=>{
      const ma=groups[a].reduce((mx,r)=>r.requestDate>mx?r.requestDate:mx,"");
      const mb=groups[b].reduce((mx,r)=>r.requestDate>mx?r.requestDate:mx,"");
      return mb.localeCompare(ma);
    });
  }

  let html="";
  if(!names.length){
    html=`<div class="empty"><div class="big">${query||filter!=="all"?L("noResultTitle"):L("noItemTitle")}</div>
      <div class="sm">${query||filter!=="all"?L("noResultSub"):L("noItemSub")}</div></div>`;
  } else {
    const forceOpen = !!(query||filter!=="all");
    for(const g of names){
      const gr=groups[g];
      const succ=gr.filter(r=>CORR().success.includes(r.status)).length;
      const pct=Math.round(succ/gr.length*100);
      const attnCnt=gr.filter(r=>isAttention(r)).length;
      const isOpen = forceOpen || openGroups.has(active+"|"+g);
      html+=`<div class="group ${isOpen?'open':''}" data-g="${esc(g)}">
        <div class="group-head" data-act="tg-group">
          <svg class="chev" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="group-name">${esc(g)}</span>
          <div class="group-meta">
            ${attnCnt?`<span class="attn-cnt">⚠ ${attnCnt}</span>`:""}
            <div class="ratio"><span class="ratio-txt">${succ}/${gr.length}</span><div class="ratio-bar"><i style="width:${pct}%"></i></div></div>
          </div>
        </div>
        <div class="rows"><div class="rows-inner">
          ${gr.map(r=>itemHTML(r)).join("")}
        </div></div>
      </div>`;
    }
  }
  $("#list").innerHTML=html;
}

function itemHTML(r){
  const key=active+"|"+r.id;
  const isOpen=openItems.has(key);
  const reasonCol=CORR().columns.find(c=>c.type==="reason");
  const reason=reasonCol?r[reasonCol.field]:"";
  const mid=r.merchantId;
  const attn=isAttention(r);
  const attnCls=attn==="high"?"attn-high":"";
  return `<div class="item ${isOpen?'open':''} ${attnCls}" data-id="${r.id}">
    <div class="item-row" data-act="tg-item">
      <div class="item-main">
        <div class="item-name">${esc(r[nameField()])||`<span style="color:var(--muted)">${L("noName")}</span>`}</div>
        <div class="item-sub">
          ${mid?`<span class="mid">${esc(mid)}</span>`:``}
          ${stepTag(r)}
          ${r.va?`<span class="va-flag va-yes" data-act="copy-va" data-va="${esc(r.va)}">VA ✓</span>`:``}
          ${reason?`<span class="reason-chip">${esc(reason)}</span>`:``}
          ${CORR().columns.filter(c=>c.type==="url"&&r[c.field]).map(c=>{const u=r[c.field],href=/^https?:\/\//i.test(u)?u:"https://"+u; return `<a class="url-chip" href="${esc(href)}" target="_blank" rel="noopener" data-act="link">${colLabel(c)} ↗</a>`;}).join("")}
        </div>
      </div>
      ${statusBadge(r.status)}
    </div>
    <div class="detail"><div class="detail-inner">
      ${stepTracker(r)}
      ${CORR().columns.filter(c=>!c.role || c.role==="status").map(c=>detailRow(r,c)).filter(Boolean).join("")}
      <button class="share-btn" data-act="copy-summary" data-id="${r.id}">${L("shareLabel")}</button>
    </div></div>
  </div>`;
}

function detailRow(r,c){
  const v=r[c.field];
  const lbl = colLabel(c);
  if(c.role==="status") return `<div class="d-item"><span class="d-key">${lbl}</span><span class="d-val">${statusBadge(r.status)}</span></div>`;
  if(!v) return "";
  let val;
  if(c.type==="url"){ const href=/^https?:\/\//i.test(v)?v:"https://"+v; val=`<a class="link-btn" href="${esc(href)}" target="_blank" rel="noopener">${c.field==="ticket"||c.field==="jira"?L("ticket"):L("open")} ↗</a>`; }
  else if(c.type==="reason") val=`<span class="reason-val">${esc(v)}</span>`;
  else if(c.type==="long") val=`<span class="memo-val">${esc(v)}</span>`;
  else if(c.type==="date"){ val=`<span class="mono">${esc(v)}</span>`; }
  else if(c.field==="va") val=`<span class="va-copy" data-act="copy-va" data-va="${esc(v)}"><span>${esc(v)}</span><svg class="copy-ic" width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="5.5" y="5.5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M4.5 11V3.5a1.5 1.5 0 011.5-1.5H11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></span>`;
  else val=`<span class="${c.mono?'mono':''}">${esc(v)}</span>`;
  return `<div class="d-item"><span class="d-key">${lbl}</span><span class="d-val ${c.mono&&c.type!=='url'?'mono':''}">${val}</span></div>`;
}

function renderTabs(){
  $("#tabs").innerHTML=Object.keys(CORRIDORS).map(k=>{
    const n=(Store.data[k]||[]).length;
    return `<button data-tab="${k}" class="${active===k?'on':''}">${CORRIDORS[k].label}<span class="tcnt">${n}</span></button>`;
  }).join("");
}
function renderChips(){
  const rows=Store.rows();
  const attnTotal=rows.filter(r=>isAttention(r)).length;
  let html=`<button class="chip ${filter==='all'?'on':''}" data-filter="all">${L("all")} <span class="cnt">${rows.length}</span></button>`;
  if(attnTotal) html+=`<button class="chip ${filter==='attention'?'on':''}" data-filter="attention"><span class="dot" style="background:var(--s-vaw-d)"></span>${L("attention")} <span class="cnt">${attnTotal}</span></button>`;
  CORR().statuses.forEach(s=>{
    const n=rows.filter(r=>r.status===s.v).length;
    if(n===0 && filter!==s.v) return;
    const t=TONES[s.tone];
    html+=`<button class="chip ${filter===s.v?'on':''}" data-filter="${esc(s.v)}"><span class="dot" style="background:var(${t.d})"></span>${esc(s.v)} <span class="cnt">${n}</span></button>`;
  });
  $("#chips").innerHTML=html;
}

$("#list").addEventListener("click",e=>{
  const el=e.target.closest("[data-act]"); if(!el)return;
  const act=el.dataset.act;
  if(act==="copy-va"){ e.stopPropagation(); clipCopy(el.dataset.va, L("vaCopied")); return; }
  if(act==="copy-summary"){ e.stopPropagation(); const r=Store.rows().find(x=>x.id===el.dataset.id); if(r) clipCopy(buildSummary(r), L("summaryCopied")); return; }
  if(act==="link") return;
  const groupEl=e.target.closest(".group"), itemEl=e.target.closest(".item");

  if(act==="tg-item"){ const k=active+"|"+id; openItems.has(k)?openItems.delete(k):openItems.add(k); itemEl.classList.toggle("open"); return; }

/* ============================ Dashboard ============================ */
$("#btnDashboard").addEventListener("click",()=>{
  dashMode=!dashMode;
  $("#list").style.display=dashMode?"none":"";
  $("#dashboard").style.display=dashMode?"":"none";
  $("#btnDashboard").classList.toggle("dash-on",dashMode);
  if(dashMode) renderDash(); else render();

function isoWeekStart(d){
  const dt=new Date(d); const day=dt.getDay();
  dt.setDate(dt.getDate()-((day+6)%7));
  return dt.toISOString().slice(0,10);
}

function renderDash(){
  const rows=Store.rows(), gf=groupField();
  const dated=rows.filter(r=>r.requestDate).map(r=>({r,d:new Date(r.requestDate)})).filter(x=>!isNaN(x.d));
  const weekMap={};
  dated.forEach(x=>{const k=isoWeekStart(x.d);weekMap[k]=(weekMap[k]||0)+1;});
  const weeks=Object.keys(weekMap).sort();
  const weekData=weeks.map(w=>({week:w,count:weekMap[w]}));
  let cum=0; weekData.forEach(w=>{cum+=w.count; w.cum=cum;});

  const monthMap={};
  dated.forEach(x=>{const k=x.r.requestDate.slice(0,7);monthMap[k]=(monthMap[k]||0)+1;});
  const months=Object.keys(monthMap).sort();
  const monthData=months.map(m=>({month:m,count:monthMap[m]}));

  const clientMap={};
  rows.forEach(r=>{const g=r[gf]||L("noGroup");clientMap[g]=(clientMap[g]||0)+1;});
  const clients=Object.entries(clientMap).map(([n,c])=>({name:n,count:c})).sort((a,b)=>b.count-a.count);

  const success=CORR().success||[];
  const isAppr=r=>success.indexOf(r.status)>=0;
  const apprAll=rows.filter(isAppr).length;
  const rateAll=rows.length?Math.round(apprAll/rows.length*100):0;
  const apM={};
  dated.forEach(x=>{const k=x.r.requestDate.slice(0,7);const o=apM[k]||(apM[k]={t:0,a:0});o.t++;if(isAppr(x.r))o.a++;});
  const apMonths=Object.keys(apM).sort();

  let h='';
  h+=`<div class="dash-card"><div class="dash-head"><div class="dash-title">${L("dashApproval")}</div><div class="dash-sub">${L("dashApproved")} ${apprAll} / ${rows.length} · ${rateAll}%</div></div>`;
  if(apMonths.length){
    apMonths.slice().reverse().forEach(m=>{
      const o=apM[m], rate=o.t?Math.round(o.a/o.t*100):0;
      h+=`<div class="dash-bar-row"><span class="dash-bar-label">${m}</span><div class="dash-bar-track"><div class="dash-bar-fill" style="width:${rate}%;background:var(--s-live-d)"></div></div><span class="dash-bar-val" style="min-width:76px">${rate}% <span style="color:var(--muted);font-weight:500">${o.a}/${o.t}</span></span></div>`;
    });
  } else { h+=`<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0">${L("dashNoDate")}</div>`; }
  h+='</div>';

  h+=`<div class="dash-card"><div class="dash-head"><div class="dash-title">${L("dashWeekly")}</div><div class="dash-sub">${dated.length} / ${rows.length}</div></div>`;
  if(weekData.length){
    h+=renderWeeklyChart(weekData);
    h+=`<div class="dash-legend"><span><i style="background:var(--accent-tint);border:1px solid var(--accent)"></i>${L("dashNew")}</span><span><i style="background:var(--s-live-d)"></i>${L("dashCum")}</span></div>`;
  } else { h+=`<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0">${L("dashNoDate")}</div>`; }
  h+='</div>';

  h+=`<div class="dash-card"><div class="dash-head"><div class="dash-title">${L("dashMonthly")}</div></div>`;
  const maxM=Math.max(...monthData.map(m=>m.count),1);
  monthData.slice().reverse().forEach(m=>{
    const p=Math.round(m.count/maxM*100);
    h+=`<div class="dash-bar-row"><span class="dash-bar-label">${m.month}</span><div class="dash-bar-track"><div class="dash-bar-fill" style="width:${p}%;background:var(--accent)"></div></div><span class="dash-bar-val">${m.count}</span></div>`;
  });
  if(!monthData.length) h+=`<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0">${L("dashNoDate")}</div>`;
  h+='</div>';

  h+=`<div class="dash-card"><div class="dash-head"><div class="dash-title">${L("dashClient")}</div></div>`;
  const maxC=Math.max(...clients.map(c=>c.count),1);
  clients.forEach(c=>{
    const p=Math.round(c.count/maxC*100);
    h+=`<div class="dash-bar-row"><span class="dash-bar-label" title="${esc(c.name)}">${esc(c.name)}</span><div class="dash-bar-track"><div class="dash-bar-fill" style="width:${p}%;background:var(--s-live-d)"></div></div><span class="dash-bar-val">${c.count}</span></div>`;
  });
  h+='</div>';

  $("#dashboard").innerHTML=h;
}

function renderWeeklyChart(data){
  const W=560,H=200,pad={t:24,r:10,b:38,l:36};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const n=data.length;
  const barW=Math.min(Math.floor(cw/n*0.6),36);
  const gap=(cw-barW*n)/(n+1);
  const maxY=Math.max(...data.map(d=>d.cum),1);
  const gridN=4;
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  for(let i=0;i<=gridN;i++){
    const y=pad.t+ch-(ch/gridN*i), v=Math.round(maxY/gridN*i);
    s+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`;
    s+=`<text x="${pad.l-6}" y="${y+3}" text-anchor="end" fill="var(--muted)" font-size="9" font-family="var(--mono)">${v}</text>`;
  }
  data.forEach((d,i)=>{
    const x=pad.l+gap+i*(barW+gap);
    const bH=Math.max((d.count/maxY)*ch,2);
    const y=pad.t+ch-bH;
    s+=`<rect x="${x}" y="${y}" width="${barW}" height="${bH}" rx="3" fill="var(--accent-tint)" stroke="var(--accent)" stroke-width="0.8"/>`;
    s+=`<text x="${x+barW/2}" y="${pad.t+ch-bH-4}" text-anchor="middle" fill="var(--accent)" font-size="8" font-weight="700" font-family="var(--mono)">${d.count}</text>`;
    const lbl=d.week.slice(5);
    s+=`<text x="${x+barW/2}" y="${H-pad.b+14}" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="var(--mono)">${lbl}</text>`;
  });
  const pts=data.map((d,i)=>{
    const x=pad.l+gap+i*(barW+gap)+barW/2;
    const y=pad.t+ch-(d.cum/maxY)*ch;
    return `${x},${y}`;
  }).join(' ');
  s+=`<polyline points="${pts}" fill="none" stroke="var(--s-live-d)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  data.forEach((d,i)=>{
    const x=pad.l+gap+i*(barW+gap)+barW/2;
    const y=pad.t+ch-(d.cum/maxY)*ch;
    s+=`<circle cx="${x}" cy="${y}" r="3" fill="var(--surface)" stroke="var(--s-live-d)" stroke-width="1.5"/>`;
    if(i===n-1||n<=12) s+=`<text x="${x}" y="${y-8}" text-anchor="middle" fill="var(--s-live-t)" font-size="9" font-weight="700" font-family="var(--mono)">${d.cum}</text>`;
  });
  s+='</svg>';
  return `<div class="dash-chart">${s}</div>`;
}

/* ============================ Import / Export ============================ */
function toCSV(){
  const cols=CORR().columns;
  const q=v=>{ v=String(v??""); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  const lines=[cols.map(c=>q(c.header)).join(",")];
  Store.rows().forEach(r=>lines.push(cols.map(c=>q(r[c.field])).join(",")));
  return lines.join("\r\n");
}
function download(name,content,type){ const b=new Blob([content],{type}); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download=name; a.click(); URL.revokeObjectURL(a.href); }
$("#btnExportCsv").addEventListener("click",()=>{ download(`SMOS_${active}_${new Date().toISOString().slice(0,10)}.csv`, "﻿"+toCSV(), "text/csv;charset=utf-8"); toast(`${active} ${L("csvExported")}`); });
$("#btnExportJson").addEventListener("click",()=>{ download(`SMOS_backup_${new Date().toISOString().slice(0,10)}.json`, JSON.stringify(Store.data,null,2), "application/json"); toast(L("jsonBackup")); });

/* ============================ Toast + init ============================ */
let toastT; function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2100); }
let pollTimer=null; let syncTimer=null;
function startPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } if(BACKEND_URL && Auth.loggedIn && POLL_SECONDS>0) pollTimer=setInterval(()=>refresh(), POLL_SECONDS*1000); }
function openConnect(){
  const statusMsg = !BACKEND_URL ? L("noBackend") : !Auth.loggedIn ? L("notLoggedIn") : Store.authError==="forbidden" ? L("forbidden") : Store.authError ? L("authError") : Store.online ? L("connected") : L("disconnected");
  openModal(`<h2>${L("connectTitle")}</h2><div class="msub">${statusMsg}</div>
    <div class="modal-actions"><button class="cancel" data-close>${L("close")}</button></div>`);
  modal.querySelector("[data-close]").onclick=closeModal;
}
$("#syncWrap").addEventListener("click", openConnect);

function showApp(){
  $("#loginScreen").classList.add("hidden");
  $("#appWrap").style.display="";
  const pill=$("#userPill");
  if(Auth.name){ pill.style.display=""; $("#userName").textContent=Auth.name; $("#userAvatar").src=Auth.picture||""; }
}
function hideApp(){
  $("#loginScreen").classList.remove("hidden");
  $("#appWrap").style.display="none";
  $("#userPill").style.display="none";
}
function doLogout(){
  Auth.clear();
  Store.data={KRW:[],VND:[]}; Store.online=false; Store.authError=false;
  if(pollTimer){ clearInterval(pollTimer); pollTimer=null; }
  if(syncTimer){ clearInterval(syncTimer); syncTimer=null; }
  google.accounts.id.disableAutoSelect();
  hideApp();
}
$("#userPill").addEventListener("click", ()=>{
  openModal(`<h2>${L("logout")}</h2><div class="msub">${Auth.email||""}</div>
    <div class="modal-actions"><button class="cancel" data-close>${L("close")}</button><button class="save" id="btnLogoutConfirm">${L("logoutYes")}</button></div>`);
  modal.querySelector("[data-close]").onclick=closeModal;
  $("#btnLogoutConfirm").onclick=()=>{ closeModal(); doLogout(); };
});

async function onLogin(credential){
  Auth.set(credential);
  const errEl=$("#loginError");
  errEl.classList.remove("show");
  await Store.load();
  if(Store.authError){
    const msg = Store.authError==="forbidden" ? L("forbidden") : L("authError");
    errEl.textContent=msg; errEl.classList.add("show");
    Auth.clear();
    return;
  }
  showApp(); render(); startPolling(); if(syncTimer) clearInterval(syncTimer); syncTimer=setInterval(updateSync, 15000);
}

function initGIS(){
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: (resp)=>{ if(resp.credential) onLogin(resp.credential); },
    auto_select: true,
  });
  google.accounts.id.renderButton($("#gsiButtonWrap"),{type:"standard",theme:"outline",size:"large",text:"signin_with",shape:"pill",width:280});
  google.accounts.id.prompt();
}

(function waitGIS(){
  if(typeof google!=="undefined" && google.accounts && google.accounts.id){ initGIS(); }
  else { setTimeout(waitGIS, 100); }
})();
