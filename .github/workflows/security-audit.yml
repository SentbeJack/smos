name: Weekly Security Audit

on:
  schedule:
    - cron: '0 1 * * 6'  # Every Saturday 10:00 KST (01:00 UTC)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run security scan
        id: scan
        run: |
          chmod +x scripts/security-scan.sh
          if scripts/security-scan.sh 2>&1 | tee /tmp/scan-output.txt; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
          else
            echo "status=findings" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Create issue if findings
        if: steps.scan.outputs.status == 'findings'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('scripts/last-scan-report.md', 'utf8');
            const today = new Date().toISOString().split('T')[0];

            // Close previous security scan issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security-scan',
              state: 'open'
            });
            for (const issue of existing.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Weekly audit findings — ${today}`,
              body: report + '\n\n---\n_Auto-generated by weekly security audit workflow._',
              labels: ['security-scan']
            });

      - name: Summary
        run: |
          if [ "${{ steps.scan.outputs.status }}" = "clean" ]; then
            echo "### ✅ Security scan passed — no issues found" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ⚠️ Security findings detected — GitHub Issue created" >> "$GITHUB_STEP_SUMMARY"
            cat scripts/last-scan-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
